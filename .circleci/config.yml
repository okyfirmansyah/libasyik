version: 2.1
orbs:
  codecov: codecov/codecov@1.0.2
  windows: circleci/windows@5.0

jobs:
  build-linux:
    machine: true
    steps:
      - checkout

      # run test postgres
      - run: docker run --rm -e POSTGRES_PASSWORD=test -p 5432:5432 -d postgres:12-alpine

      # build the application image
      - run: docker build . -t test-docker --build-arg DOCKER_TYPE=TEST

      # run test app
      - run: docker run -it --rm --network=host -v ${PWD}/coverage:/mnt/coverage test-docker bash /usr/local/libasyik/tests/test_and_coverage.sh

      - codecov/upload:
          file: coverage/libasyik_test.info

  build-windows:
    executor:
      name: windows/default
      size: medium
    steps:
      - checkout

      - run:
          name: Setup build environment
          shell: powershell.exe
          command: |
            $env:VCPKG_ROOT = "C:\vcpkg"
            $env:VCPKG_FORCE_SYSTEM_BINARIES = "1"
            $env:X_VCPKG_ASSET_SOURCES = "clear;x-script,curl --ssl-no-revoke -L {url} --output {dst}"
            [Environment]::SetEnvironmentVariable("VCPKG_ROOT", $env:VCPKG_ROOT, [System.EnvironmentVariableTarget]::Machine)
            [Environment]::SetEnvironmentVariable("VCPKG_FORCE_SYSTEM_BINARIES", $env:VCPKG_FORCE_SYSTEM_BINARIES, [System.EnvironmentVariableTarget]::Machine)
            [Environment]::SetEnvironmentVariable("X_VCPKG_ASSET_SOURCES", $env:X_VCPKG_ASSET_SOURCES, [System.EnvironmentVariableTarget]::Machine)

      - restore_cache:
          keys:
            - vcpkg-cache-{{ checksum "vcpkg.json" }}

      - run:
          name: Configure with CMake
          shell: powershell.exe
          command: cmake --preset windows-clang-cl

      - run:
          name: Build project
          shell: powershell.exe
          command: cmake --build build --config Debug -j 4

      - run:
          name: Run tests with SQL disabled
          shell: powershell.exe
          command: |
            $testExe = Get-ChildItem -Path "build" -Filter "libasyik_test.exe" -Recurse | Select-Object -First 1
            if ($testExe) {
              & $testExe.FullName '~[sql]' --reporter compact
            } else {
              Write-Error "libasyik_test.exe not found"
              exit 1
            }

      - save_cache:
          key: vcpkg-cache-{{ checksum "vcpkg.json" }}
          paths:
            - C:\vcpkg\installed

workflows:
  build:
    jobs:
      - build-linux
      - build-windows
