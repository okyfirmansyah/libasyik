version: 2.1
orbs:
  codecov: codecov/codecov@1.0.2
  windows: circleci/windows@5.0

jobs:
  build-linux:
    machine: true
    steps:
      - checkout

      # run test postgres
      - run: docker run --rm -e POSTGRES_PASSWORD=test -p 5432:5432 -d postgres:12-alpine

      # build the application image
      - run: docker build . -t test-docker --build-arg DOCKER_TYPE=TEST

      # run test app
      - run: docker run -it --rm --network=host -v ${PWD}/coverage:/mnt/coverage test-docker bash /usr/local/libasyik/tests/test_and_coverage.sh

      - codecov/upload:
          file: coverage/libasyik_test.info

  build-windows:
    executor:
      name: windows/default
      size: large
    environment:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      X_VCPKG_ASSET_SOURCES: "clear;x-script,curl --ssl-no-revoke -L {url} --output {dst}"
    steps:
      - checkout

      - run:
          name: Install build tools
          shell: powershell.exe
          timeout: 3600
          command: |
            # Install Visual Studio Build Tools with C++ workload if not present
            if (-not (Test-Path "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat")) {
              Write-Host "Installing Visual Studio Build Tools..."
              choco install -y visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools"
            }
            # Install other tools
            choco install -y cmake ninja llvm

      - restore_cache:
          keys:
            - vcpkg-cache-{{ checksum "vcpkg.json" }}

      - run:
          name: Configure with CMake
          shell: cmd.exe
          command: |
            call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            cmake --preset windows-clang-cl -DCMAKE_MAKE_PROGRAM=ninja

      - run:
          name: Build project
          shell: cmd.exe
          command: |
            call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            cmake --build build --config Debug

      - run:
          name: Run tests with SQL disabled
          shell: cmd.exe
          command: |
            set PATH=C:\vcpkg\installed\x64-windows\bin;%PATH%
            for /f "delims=" %%x in ('dir /s /b build\tests\libasyik_test.exe') do (
              %%x ~[sql] --reporter compact
              exit /b !ERRORLEVEL!
            )
            exit /b 1

      - save_cache:
          key: vcpkg-cache-{{ checksum "vcpkg.json" }}
          paths:
            - C:\vcpkg\installed

workflows:
  build:
    jobs:
      - build-linux
      - build-windows
