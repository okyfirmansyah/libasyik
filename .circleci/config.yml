version: 2.1
orbs:
  codecov: codecov/codecov@1.0.2
  windows: circleci/windows@5.0

jobs:
  build-linux:
    machine: true
    steps:
      - checkout

      # run test postgres
      - run: docker run --rm -e POSTGRES_PASSWORD=test -p 5432:5432 -d postgres:12-alpine

      # build the application image
      - run: docker build . -t test-docker --build-arg DOCKER_TYPE=TEST

      # run test app
      - run: docker run -it --rm --network=host -v ${PWD}/coverage:/mnt/coverage test-docker bash /usr/local/libasyik/tests/test_and_coverage.sh

      - codecov/upload:
          file: coverage/libasyik_test.info

  build-windows:
    executor:
      name: windows/default
      size: medium
    steps:
      - checkout

      - run:
          name: Install build tools (CMake, Ninja, LLVM)
          shell: powershell.exe
          command: |
            choco install -y cmake ninja llvm

      - run:
          name: Setup build environment
          shell: cmd.exe
          command: |
            call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            set VCPKG_ROOT=C:\vcpkg
            set VCPKG_FORCE_SYSTEM_BINARIES=1
            set X_VCPKG_ASSET_SOURCES=clear;x-script,curl --ssl-no-revoke -L {url} --output {dst}
            set PATH=C:\Program Files\LLVM\bin;%PATH%
            set PATH=C:\Program Files\CMake\bin;%PATH%
            echo %PATH%

      - restore_cache:
          keys:
            - vcpkg-cache-{{ checksum "vcpkg.json" }}

      - run:
          name: Configure with CMake
          shell: cmd.exe
          command: |
            call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            set VCPKG_ROOT=C:\vcpkg
            set VCPKG_FORCE_SYSTEM_BINARIES=1
            set X_VCPKG_ASSET_SOURCES=clear;x-script,curl --ssl-no-revoke -L {url} --output {dst}
            set PATH=C:\Program Files\LLVM\bin;%PATH%
            set PATH=C:\Program Files\CMake\bin;%PATH%
            cmake --preset windows-clang-cl -DCMAKE_MAKE_PROGRAM=ninja

      - run:
          name: Build project
          shell: cmd.exe
          command: |
            call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            set PATH=C:\Program Files\LLVM\bin;%PATH%
            set PATH=C:\Program Files\CMake\bin;%PATH%
            cmake --build build --config Debug

      - run:
          name: Run tests with SQL disabled
          shell: cmd.exe
          command: |
            set PATH=C:\vcpkg\installed\x64-windows\bin;%PATH%
            for /f "delims=" %%x in ('dir /s /b build\tests\libasyik_test.exe') do (
              %%x ~[sql] --reporter compact
              exit /b !ERRORLEVEL!
            )
            exit /b 1

      - save_cache:
          key: vcpkg-cache-{{ checksum "vcpkg.json" }}
          paths:
            - C:\vcpkg\installed

workflows:
  build:
    jobs:
      - build-linux
      - build-windows
