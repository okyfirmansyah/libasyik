version: 2.1
orbs:
  codecov: codecov/codecov@1.0.2
  windows: circleci/windows@5.0

jobs:
  build-linux:
    machine: true
    steps:
      - checkout

      # run test postgres
      - run: docker run --rm -e POSTGRES_PASSWORD=test -p 5432:5432 -d postgres:12-alpine

      # build the application image
      - run: docker build . -t test-docker --build-arg DOCKER_TYPE=TEST

      # run test app
      - run: docker run -it --rm --network=host -v ${PWD}/coverage:/mnt/coverage test-docker bash /usr/local/libasyik/tests/test_and_coverage.sh

      - codecov/upload:
          file: coverage/libasyik_test.info

  build-windows:
    executor:
      name: windows/default
      size: large
    environment:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_FORCE_SYSTEM_BINARIES: "1"
      X_VCPKG_ASSET_SOURCES: "clear;x-script,curl --ssl-no-revoke -L {url} --output {dst}"
    steps:
      - checkout

      - run:
          name: Install build tools from pre-built releases
          shell: powershell.exe
          timeout: 1800
          command: |
            # Download and install CMake
            Write-Host "Installing CMake..."
            choco install -y cmake

            # Download and install Ninja
            Write-Host "Installing Ninja..."
            choco install -y ninja

            # Download and install LLVM with clang-cl (latest available)
            Write-Host "Installing LLVM..."
            choco install -y llvm

      - restore_cache:
          keys:
            - vcpkg-cache-windows-{{ checksum "vcpkg.json" }}
            - vcpkg-cache-windows-

      - run:
          name: Configure and build
          shell: cmd.exe
          command: |
            setlocal enabledelayedexpansion
            set PATH=C:\Program Files\LLVM\bin;C:\Program Files\CMake\bin;C:\Program Files\Ninja;%PATH%

            REM Add MSVC to path if available
            if exist "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" (
              call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
            ) else if exist "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvarsall.bat" (
              call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvarsall.bat" x64
            )

            cmake --preset windows-clang-cl -DCMAKE_MAKE_PROGRAM=ninja
            if errorlevel 1 exit /b 1

            cmake --build build --config Debug
            if errorlevel 1 exit /b 1

      - run:
          name: Run tests
          shell: cmd.exe
          command: |
            setlocal enabledelayedexpansion
            set PATH=C:\vcpkg\installed\x64-windows\bin;%PATH%

            REM Find and run test executable
            for /f "delims=" %%x in ('dir /s /b build\*\libasyik_test.exe') do (
              echo Running tests from: %%x
              %%x ~[sql] --reporter compact
              exit /b !ERRORLEVEL!
            )

            echo Test executable not found
            exit /b 1

      - save_cache:
          key: vcpkg-cache-windows-{{ checksum "vcpkg.json" }}
          paths:
            - C:\vcpkg\installed

workflows:
  build:
    jobs:
      - build-linux
      - build-windows
